<header class="header">
  <div class="header-container">
    <a class="header-logo" routerLink="/">Vouch</a>
    <nav class="header-nav">
      @if (authService.currentUser()) {
        <span class="header-username">{{ authService.currentUser()!.name }}</span>
        <button class="header-btn-logout" (click)="logout()">Cerrar sesión</button>
      } @else {
        <a class="header-btn-login" routerLink="/login">Iniciar sesión</a>
      }
    </nav>
  </div>
</header>
