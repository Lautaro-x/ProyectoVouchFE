@if (loading()) {
  <p class="pc-loading">{{ 'common.loading' | transloco }}</p>
} @else {

  <div class="pc-save-row">
    <button class="btn-primary" (click)="saveBackgrounds()" [disabled]="savingBg()">
      @if (savingBg()) { {{ 'public_profile.saving_bg' | transloco }} }
      @else if (savedBg()) { {{ 'public_profile.saved_bg' | transloco }} }
      @else { {{ 'public_profile.save_bg' | transloco }} }
    </button>
  </div>

  <!-- ═══ CARD 1 — FULL (720 × 430 px) ═══ -->
  <section class="pc-section">
    <h2 class="pc-section-title">{{ 'public_profile.card_full_title' | transloco }}</h2>
    <div class="pc-bg-input">
      <label class="pc-bg-label">{{ 'public_profile.bg_url' | transloco }}</label>
      <input class="pc-bg-field" type="text" [value]="fullBg()"
             (input)="fullBg.set($any($event.target).value)"
             [placeholder]="'public_profile.bg_url_ph' | transloco" />
    </div>
    <div class="pc-card-wrap">
      <app-user-profile-card
        [card]="previewBigCard()!"
        [isSelf]="true"
        [isAuthenticated]="true"
      />
    </div>
    <button class="btn-secondary" (click)="copyLink('big')">
      {{ copiedBig() ? ('public_profile.copied_link' | transloco) : ('public_profile.copy_link' | transloco) }}
    </button>
  </section>


  <!-- ═══ CARD 2 — RESUMEN INSTAGRAM (480 × 480 px) ═══ -->
  <section class="pc-section">
    <h2 class="pc-section-title">{{ 'public_profile.card_summary_title' | transloco }}</h2>
    <div class="pc-bg-input">
      <label class="pc-bg-label">{{ 'public_profile.bg_url' | transloco }}</label>
      <input class="pc-bg-field" type="text" [value]="midBg()"
             (input)="midBg.set($any($event.target).value)"
             [placeholder]="'public_profile.bg_url_ph' | transloco" />
    </div>
    <div class="pc-card-wrap">
      @if (midSrcdoc()) {
        <iframe [srcdoc]="midSrcdoc()!"
                class="pc-iframe pc-iframe--mid"
                scrolling="no" frameborder="0"></iframe>
      }
    </div>
    <button class="btn-secondary" (click)="copyLink('mid')">
      {{ copiedMid() ? ('public_profile.copied_link' | transloco) : ('public_profile.copy_link' | transloco) }}
    </button>
  </section>


  <!-- ═══ CARD 3 — MINI WHATSAPP (360 × 160 px) ═══ -->
  <section class="pc-section">
    <h2 class="pc-section-title">{{ 'public_profile.card_mini_title' | transloco }}</h2>
    <div class="pc-bg-input">
      <label class="pc-bg-label">{{ 'public_profile.bg_url' | transloco }}</label>
      <input class="pc-bg-field" type="text" [value]="miniBg()"
             (input)="miniBg.set($any($event.target).value)"
             [placeholder]="'public_profile.bg_url_ph' | transloco" />
    </div>
    <div class="pc-card-wrap">
      @if (miniSrcdoc()) {
        <iframe [srcdoc]="miniSrcdoc()!"
                class="pc-iframe pc-iframe--mini"
                scrolling="no" frameborder="0"></iframe>
      }
    </div>
    <button class="btn-secondary" (click)="copyLink('mini')">
      {{ copiedMini() ? ('public_profile.copied_link' | transloco) : ('public_profile.copy_link' | transloco) }}
    </button>
  </section>

}
