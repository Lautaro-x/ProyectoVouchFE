<aside class="sidebar" [class.sidebar--open]="navOpen()">
  <div class="sidebar-brand">
    <a class="brand-link" routerLink="/">
      <span class="brand-vouch">VOUCH</span>
    </a>
    <div class="sidebar-brand-right">
      <app-lang-switcher />
      <button class="mobile-nav-toggle" (click)="toggleNav()" [attr.aria-expanded]="navOpen()">
        @if (navOpen()) {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        }
      </button>
    </div>
  </div>

  <div class="sidebar-identity">
    @if (user()?.avatar && !avatarBroken()) {
      <img [src]="user()!.avatar!" [alt]="user()!.name" class="sidebar-avatar" (error)="onAvatarError()" loading="eager" />
    } @else {
      <div class="sidebar-avatar-placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2a5 5 0 1 1 0 10A5 5 0 0 1 12 2zm0 12c5.33 0 8 2.67 8 4v2H4v-2c0-1.33 2.67-4 8-4z"/>
        </svg>
      </div>
    }
    <span class="sidebar-username">{{ user()?.name }}</span>
  </div>

  <nav class="sidebar-nav">
    @for (section of sections; track section.path) {
      <a
        [routerLink]="section.path"
        routerLinkActive="active"
        class="nav-item"
      >{{ section.labelKey | transloco }}</a>
    }
  </nav>

  <div class="sidebar-footer">
    @if (user()?.role === 'admin') {
      <a class="admin-link" routerLink="/administration">{{ 'header.administration' | transloco }}</a>
    }
    <a class="btn-primary sidebar-back-link" routerLink="/">{{ 'profile.back_to_vouch' | transloco }}</a>
    <button class="btn-secondary" (click)="logout()">{{ 'header.logout' | transloco }}</button>
  </div>
</aside>

<main class="user-main" (click)="closeNav()">
  <router-outlet />
</main>
