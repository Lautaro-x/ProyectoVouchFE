<section class="hero">
  <div class="hero-content">
    <p class="hero-eyebrow">{{ 'hero.eyebrow' | transloco }}</p>
    <h1 class="hero-title">{{ 'hero.title' | transloco }}</h1>
    <p class="hero-subtitle">{{ 'hero.subtitle' | transloco }}</p>
    <a class="hero-cta" routerLink="/login">{{ 'hero.cta' | transloco }}</a>
  </div>
  <div class="hero-decoration" aria-hidden="true">
    <span class="hero-grade hero-grade--1">S</span>
    <span class="hero-grade hero-grade--2">A</span>
    <span class="hero-grade hero-grade--3">B+</span>
  </div>
</section>
