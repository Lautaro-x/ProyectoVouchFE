<app-dialog
  title="Dejar de fiarse"
  [subtitle]="'¿Seguro que quieres dejar de fiarte de ' + (card()?.name ?? '') + '?'"
  [isOpen]="unfollowDialogOpen()"
  (closed)="unfollowDialogOpen.set(false)"
>
  <div class="form-actions">
    <button class="btn-primary danger" (click)="confirmUnfollow()">Dejar de fiarse</button>
    <button class="btn-ghost" (click)="unfollowDialogOpen.set(false)">Cancelar</button>
  </div>
</app-dialog>

@if (loading()) {
  <div class="pp-loading">Cargando…</div>
} @else if (!card()) {
  <div class="pp-error">Usuario no encontrado.</div>
} @else {
  <app-user-profile-card
    [card]="card()!"
    [responsive]="true"
    [following]="following()"
    [followBusy]="followBusy()"
    [isSelf]="isSelf()"
    [isAuthenticated]="auth.isAuthenticated()"
    (followClick)="onFollowClick()"
  />
}
