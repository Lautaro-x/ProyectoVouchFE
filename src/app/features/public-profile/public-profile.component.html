<app-dialog
  [title]="'public_profile.unfollow_title' | transloco"
  [subtitle]="('public_profile.unfollow_confirm' | transloco: { name: card()?.name ?? '' })"
  [isOpen]="unfollowDialogOpen()"
  (closed)="unfollowDialogOpen.set(false)"
>
  <div class="form-actions">
    <button class="btn-primary danger" (click)="confirmUnfollow()">{{ 'public_profile.unfollow_title' | transloco }}</button>
    <button class="btn-ghost" (click)="unfollowDialogOpen.set(false)">{{ 'common.cancel' | transloco }}</button>
  </div>
</app-dialog>

@if (loading()) {
  <div class="pp-loading">{{ 'common.loading' | transloco }}</div>
} @else if (!card()) {
  <div class="pp-error">{{ 'public_profile.not_found' | transloco }}</div>
} @else {
  <app-user-profile-card
    [card]="card()!"
    [responsive]="true"
    [following]="following()"
    [followBusy]="followBusy()"
    [isSelf]="isSelf()"
    [isAuthenticated]="auth.isAuthenticated()"
    (followClick)="onFollowClick()"
  />
}
